<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even or Odd Checker</title>

    <style>
        /* Global styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #4caf50;
        }

        .container {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
            width: 300px;
            box-sizing: border-box;
        }

        input[type="number"] {
            padding: 10px;
            font-size: 18px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #45a049;
        }

        p {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-top: 20px;
        }

        p.even {
            color: #4caf50;
        }

        p.odd {
            color: #f44336;
        }
    </style>
</head>

<body>

    <h1>Check if a Number is Even or Odd</h1>

    <div class="container">
        <input type="number" id="num1" placeholder="Enter a number here" />
        <button onclick="check()">Check</button>
        <p id="para"></p>
    </div>

    <script>
        function check() {
            const num1 = document.getElementById("num1").value;
            let result = num1 % 2 == 0 ? "Even" : "Odd";
            let para = document.getElementById("para");
            para.innerHTML = `The number is ${result}`;

            // Add classes to change text color based on result
            if (result === "Even") {
                para.classList.add("even");
                para.classList.remove("odd");
            } else {
                para.classList.add("odd");
                para.classList.remove("even");
            }
        }
    </script>

</body>

</html>
