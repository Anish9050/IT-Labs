<!DOCTYPE html>
<html>

<head>
    <title>Student Result</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 320px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 12px;
            border: none;
            border-radius: 6px;
            background-color: #667eea;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #5a67d8;
            transform: translateY(-2px);
        }

        p {
            margin: 8px 0;
            font-weight: bold;
        }

        #result {
            font-size: 16px;
        }

        .pass {
            color: green;
        }

        .fail {
            color: red;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Student Result</h2>

        <input type="number" id="sub1" placeholder="Subject 1: Marks">
        <input type="number" id="sub2" placeholder="Subject 2: Marks">
        <input type="number" id="sub3" placeholder="Subject 3: Marks">

        <button onclick="getResult()">Get Result</button>

        <p id="result"></p>
        <p id="avg"></p>
        <p id="total"></p>
    </div>

    <script>
        function getResult() {
            const m1 = parseInt(document.getElementById('sub1').value) || 0;
            const m2 = parseInt(document.getElementById('sub2').value) || 0;
            const m3 = parseInt(document.getElementById('sub3').value) || 0;

            const total = m1 + m2 + m3;
            const avg = total / 3;

            const resultText = (m1 >= 40 && m2 >= 40 && m3 >= 40)
                ? "🎉 Congratulations! You Passed"
                : "❌ Better luck next time";

            const resultElement = document.getElementById('result');
            resultElement.innerHTML = resultText;
            resultElement.className = (m1 >= 40 && m2 >= 40 && m3 >= 40) ? "pass" : "fail";

            document.getElementById('avg').innerHTML = "Average: " + avg.toFixed(2);
            document.getElementById('total').innerHTML = "Total: " + total;
        }
    </script>
</body>

</html>
