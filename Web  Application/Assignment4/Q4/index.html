<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dynamic Live Search</title>

    <style>
        body{
            font-family: Arial;
            text-align:center;
            background:#f2f2f2;
        }

        .container{
            width:400px;
            margin:auto;
            margin-top:40px;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input, button{
            padding:8px;
            margin:5px;
            width:80%;
        }

        li{
            list-style:none;
            background:#e3f2fd;
            margin:5px;
            padding:8px;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Live Search Filter</h2>

<!-- Add Item -->
<input type="text" id="itemInput" placeholder="Enter item">
<button onclick="addItem()">Add Item</button>

<br><br>

<!-- Search -->
<input type="text"
       id="searchBox"
       placeholder="Search item..."
       onkeyup="filterItems()">

<ul id="itemList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
