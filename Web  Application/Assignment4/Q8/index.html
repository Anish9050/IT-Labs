<!DOCTYPE html>
<html lang="en">
<head>
    <title>Image Slider</title>

    <style>
        body{
            font-family: Arial;
            text-align:center;
            background:#f2f2f2;
        }

        .slider{
            width:400px;
            margin:auto;
            margin-top:50px;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        img{
            width:100%;
            height:250px;
            border-radius:10px;
        }

        button{
            padding:10px 15px;
            margin:10px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="slider">

<h2>Image Slider</h2>

<img id="sliderImage" src="" alt="Slider Image">

<br>

<button onclick="prevImage()">Previous</button>
<button onclick="nextImage()">Next</button>

</div>

<script src="script.js"></script>

</body>
</html>
