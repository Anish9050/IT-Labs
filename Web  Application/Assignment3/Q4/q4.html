<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shopping Cart</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        header {
            background-color: #1E2A47;
            padding: 15px 0;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        nav ul {
            list-style-type: none;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        nav ul li {
            display: inline-block;
            margin: 0 20px;
        }

        nav ul li a {
            color: #fff;
            font-size: 16px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 15px;
            transition: background-color 0.3s;
        }

        nav ul li a:hover {
            background-color: #d80505;
            border-radius: 4px;
        }

        main {
            padding: 40px 15px;
            max-width: 1200px;
            margin: auto;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 36px;
        }

        h2 {
            text-align: center;
            color: #1E2A47;
            font-size: 28px;
            margin-bottom: 30px;
        }

        .product-grid {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }

        .product-card {
            background-color: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 280px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .product-card h3 {
            font-size: 20px;
            color: #333;
            margin-bottom: 10px;
        }

        .product-card p {
            font-size: 16px;
            color: #888;
            margin-bottom: 15px;
        }

        .product-card a {
            display: inline-block;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .product-card a:hover {
            background-color: #76c3f7;
        }


        footer {
            background-color: #1E2A47;
            color: #fff;
            text-align: center;
            padding: 15px;
            position: relative;
            width: 100%;
            bottom: 0;
        }


        @media (max-width: 768px) {
            .product-grid {
                justify-content: center;
            }

            nav ul li {
                margin: 0 10px;
            }

            h1 {
                font-size: 30px;
            }

            h2 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="q4.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="checkout.html">Checkout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Welcome to My Online Store</h1>
        <section>
            <h2>Featured Products</h2>
            <div class="product-grid">
                <div class="product-card">
                    <img src="https://via.placeholder.com/250x200" alt="Product 1">
                    <h3>Product A</h3>
                    <p>65.00 Rupee only</p>
                    <a href="product-detail.html">View Details</a>
                </div>
                <div class="product-card">
                    <img src="https://via.placeholder.com/250x200" alt="Product 2">
                    <h3>Product B</h3>
                    <p>39.00 Rupee only</p>
                    <a href="product-detail.html">View Details</a>
                </div>
                <div class="product-card">
                    <img src="https://via.placeholder.com/250x200" alt="Product 3">
                    <h3>Product C</h3>
                    <p>78.00 Rupee only</p>
                    <a href="product-detail.html">View Details</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Online Shopping Cart by Anish</p>
    </footer>
</body>

</html>
