<!DOCTYPE html>
<html>

<head>
    <title>Q1</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        .container {
            text-align: center;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #45a049;
        }

        p {
            font-size: 18px;
            margin-top: 20px;
        }

        .error {
            color: red;
            font-weight: bold;
        }

        .success {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Number to Words Converter</h1>
        <input type="text" id="num1" placeholder="Enter a number here" />
        <button onclick="check()">Validate</button>
        <p id="para"></p>
    </div>

    <script>
        function check() {
            const num = document.getElementById("num1").value;
            const p = document.getElementById("para");
            p.className = '';  // Reset any previous classes

            for (let c = 0; c < num.length; c++) {
                if (isNaN(Number(num[c]))) {
                    p.className = 'error';
                    p.innerText = "INVALID";
                    return;
                }
            }
            if (num.length >= 4) {
                p.className = 'error';
                p.innerText = "Invalid (Number should be less than 1000)";
                return;
            }
            const num1 = parseInt(num);
            if (num1 < 0) {
                p.className = 'error';
                p.innerText = "Invalid (Number should be non-negative)";
                return;
            }
            console.log(numberToWords(num1));
            p.className = 'success';
            p.innerText = numberToWords(num1);
        }

        function numberToWords(num) {
            if (num === 0) return 'zero';

            const units = ['', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine'];
            const teens = ['ten', 'eleven', 'twelve', 'thirteen', 'fourteen', 'fifteen', 'sixteen', 'seventeen', 'eighteen', 'nineteen'];
            const tens = ['', '', 'twenty', 'thirty', 'forty', 'fifty', 'sixty', 'seventy', 'eighty', 'ninety'];
            const scales = ['', 'thousand', 'million', 'billion', 'trillion'];

            function convertChunk(n) {
                let chunk = '';
                if (n >= 100) {
                    chunk += units[Math.floor(n / 100)] + ' hundred ';
                    n %= 100;
                }
                if (n < 10) {
                    chunk += units[n];
                } else if (n >= 10 && n < 20) {
                    chunk += teens[n - 10];
                } else {
                    chunk += tens[Math.floor(n / 10)] + (n % 10 !== 0 ? ' ' + units[n % 10] : '');
                }
                return chunk.trim();
            }

            let words = '';
            let scaleIndex = 0;

            while (num > 0) {
                if (num % 1000 !== 0) {
                    const chunkWords = convertChunk(num % 1000);
                    words = chunkWords + (scales[scaleIndex] ? ' ' + scales[scaleIndex] : '') + (words ? ' ' + words : '');
                }
                num = Math.floor(num / 1000);
                scaleIndex++;
            }

            return words.trim();
        }
    </script>
</body>

</html>
